services:
  backend:
    build:
      context: ./be
    container_name: gym-log-be
    ports:
      - "8000:8000"
    env_file:
      - ./be/.env
    volumes:
      - ./data:/app/data   # SQLite DB 영속화: 프로젝트 루트의 ./data/ 폴더에 저장됨
    networks:
      - gym-network

  frontend:
    build:
      context: ./fe
    container_name: gym-log-fe
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gym-network

networks:
  gym-network:
